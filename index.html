<div class="background_hora"><div id="relogio">00:00:00</div></div>
<script>
(function () {
    const elementoID = document.getElementById('relogio');
    const TIME_API_URL = 'https://time.now/developer/api/timezone/America/Sao_Paulo';
    let relogioTimer = null;
    let resincronizaTimer = null;
    let serverOffsetMs = 0;
    let timezoneAtual = 'America/Sao_Paulo';

    function formatar2(n) {
        return String(n).padStart(2, '0');
    }

    function renderizarHora() {
        const agoraServidor = new Date(Date.now() + serverOffsetMs);

        try {
            const partes = new Intl.DateTimeFormat('pt-BR', {
                timeZone: timezoneAtual,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            }).formatToParts(agoraServidor);

            const hh = partes.find(p => p.type === 'hour')?.value || '00';
            const mm = partes.find(p => p.type === 'minute')?.value || '00';
            const ss = partes.find(p => p.type === 'second')?.value || '00';

            elementoID.textContent = `${hh}:${mm}:${ss}`;
        } catch (erro) {
            console.error('Erro ao renderizar relógio:', erro);
            const hh = formatar2(agoraServidor.getHours());
            const mm = formatar2(agoraServidor.getMinutes());
            const ss = formatar2(agoraServidor.getSeconds());
            elementoID.textContent = `${hh}:${mm}:${ss}`;
        }
    }

    async function sincronizarHora() {
        try {
            const resposta = await fetch(TIME_API_URL, { cache: 'no-store' });
            if (!resposta.ok) {
                throw new Error('Falha ao consultar Time.now');
            }

            const dados = await resposta.json();

            if (!dados || !dados.datetime) {
                throw new Error('Resposta da Time.now sem datetime');
            }

            timezoneAtual = dados.timezone || 'America/Sao_Paulo';

            const apiNowMs = new Date(dados.datetime).getTime();
            serverOffsetMs = apiNowMs - Date.now();

            renderizarHora();
        } catch (erro) {
            console.error('Erro ao sincronizar relógio pela Time.now:', erro);
            renderizarHora();
        }
    }

    renderizarHora();
    sincronizarHora();

    if (relogioTimer) clearInterval(relogioTimer);
    relogioTimer = setInterval(renderizarHora, 1000);

    if (resincronizaTimer) clearInterval(resincronizaTimer);
    resincronizaTimer = setInterval(sincronizarHora, 5 * 60 * 1000);
})();
</script>
