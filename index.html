<style>
html,body{font-family:"Open Sans",sans-serif;height:100%;margin:0;display:flex;flex-direction:column;color:#272829;overflow:hidden;background:#000;}
a{text-decoration:none;color:rgba(255,255,255,1)}
a:hover{color:rgba(255,255,255,1);text-decoration:none}

#header{
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    transition:all .5s;
    background:rgba(255,255,255,0);
    padding:20px 20px 0
}

.nav-menu *{margin:0;padding:0;list-style:none}
.nav-menu > ul > li{position:relative;white-space:nowrap}
.nav-menu a{
    display:flex;

    color:red;
    padding-left:18px;

    transition:.3s;
    font-size:15px;
    border-radius:50px;
    background:#f2f3f5;

    width:100%;
    overflow:hidden;
}
.nav-menu a i{font-size:16px}

.mobile-nav-toggle{
    position:fixed;
    top:15px;

    right:auto;
    z-index:1001;

    background:none;

    outline:none!important;
    line-height:1;

    text-align:left
}
.mobile-nav-toggle i{color:#fff}

.mobile-nav-active{
    overflow:hidden
}
.mobile-nav-active #header{
    left:0
}
.mobile-nav-active .mobile-nav-toggle{
    left:auto;
    right:15px;

    body div#player div#playervolumebackground {

        left: 0 !important;

    body div#player img#playervolumegrab {

        margin: 0 !important;

    body div#player div#playervolumeicon {

    /* Reativando o VU no modo paisagem e posicionando atrás da barra de volume */

    body div#player canvas#playercanvas {

        visibility: visible !important;

        left: 0;

        height: 100%;
        pointer-events: none !important;
        z-index: 24 !important;

        transform: translateX(-50%) !important;

        z-index: 40 !important;

        padding: 10px;

}

/* === Custom Overrides for User Requests === */
/* Ajustes para modo paisagem em mobile (largura <= 900px) */
@media (max-width: 900px) and (orientation: landscape) {
    /* Descer o texto da música/cantor sem tocar a barra de volume */
    body div#player #atividade-song-info-external {
        /* Move o texto um pouco para baixo comparado ao valor original de 22% */
        top: 22.4% !important;
    }

    /* Aumentar o tamanho dos ícones de volume (mute/unmute) */
    body div#player div#playerbuttonvolumeoff,
    body div#player div#playerbuttonvolumeon {
        /* Define dimensões maiores sem escalar o contêiner */
        width: 40px !important;
        height: 40px !important;
    }

    /* Garante que o ícone interno de volume seja legível */
    body div#player div#playerbuttonvolumeoff *,
    body div#player div#playerbuttonvolumeon * {
        font-size: 26px !important;
    }

    /* Aumentar o tamanho do número do volume e aproximá-lo do ícone */
    body div#player div#playertextvolumeend {
        font-size: 1.2em !important;
        line-height: 1.2 !important;
        /* Afasta um pouco mais do ícone unmute sem mexer na barra */
        right: calc(var(--land-vol-right) + 46px) !important;
    }

    /* Aproximar o ícone LIVE do botão de play/pause */
    body div#player div#playericonlive {
        /* Desce mais um pouco e reduz levemente o LIVE sem mexer na posição horizontal */
        top: calc(var(--land-vol-controls-top) + 31px) !important;
        left: 73% !important;
        min-width: 30px !important;
        min-height: 30px !important;
        width: 30px !important;
        height: 30px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
    }
}

/* Ajustes para modo retrato (portrait) em dispositivos móveis */
@media (max-width: 900px) and (orientation: portrait) {
    /* Subir levemente o nome da rádio e da música/cantor */
    body div#player div#playertextradioname {
        /* Sobe um pouco o nome da rádio para ficar mais perto da foto */
        margin-top: -36px !important;
    }
    body div#player #atividade-song-info-external {
        /* Desce um pouco a linha música/cantor no retrato, mantendo o nome da rádio igual */
        margin-top: -8px !important;
    }
}

/* Ajustes para modo desktop/PC (largura >= 901px) */
@media (min-width: 901px) {
    /* Subir levemente o nome da rádio e da música/cantor */
    body div#player div#playertextradioname {
        /* Sobe um pouco o nome da rádio no PC para aproximar da foto */
        margin-top: -44px !important;
    }
    body div#player #atividade-song-info-external {
        /* Desce um pouco a linha música/cantor no PC, mantendo o nome da rádio igual */
        margin-top: -8px !important;
    }

    /* Aumentar o tamanho dos ícones de volume no modo desktop/PC
       e melhorar legibilidade do valor do volume */
    body div#player div#playerbuttonvolumeoff,
    body div#player div#playerbuttonvolumeon {
        width: 40px !important;
        height: 40px !important;
        transform: scale(1.4) !important;
        transform-origin: center center !important;
    }
    /* Garante que o ícone interno de volume amplie junto no modo desktop */
    body div#player div#playerbuttonvolumeoff *,
    body div#player div#playerbuttonvolumeon * {
        font-size: 26px !important;
    }
    body div#player div#playertextvolumeend {
        font-size: 1.2em !important;
        line-height: 1.2 !important;
    }
}
</style>

<div id="main-wrapper">

<script>
(function () {
    window.resetUI = window.resetUI || function () {};

    const TIME_API_URL = 'https://time.now/developer/api/timezone/America/Sao_Paulo';
    const ZENO_STREAM_URL = 'https://stream.zeno.fm/z2h3tpp2fchvv';
    const ZENO_METADATA_EVENTSOURCE_URL = 'https://api.zeno.fm/mounts/metadata/subscribe/z2h3tpp2fchvv';
    const FALLBACK_ENTRY_URL = 'https://atividadefm.dpdns.org/all';
    const FALLBACK_METADATA_BASE_URL = 'https://atividadefm.dpdns.org/metadados';
    const FALLBACK_HEALTH_CHECK_MS = 12000;
    const ZENO_RETURN_PROBE_MS = 20000;
    const ZENO_RETURN_PROBE_TIMEOUT_MS = 8000;
    const FAILOVER_COOLDOWN_MS = 8000;

    const STREAMS = {
        zeno: {
            mode: 'zeno',
            radioname: 'ATIVIDADE FM',
            streamurl: ZENO_STREAM_URL,
            streamtype: 'zeno',
            icecastmountpoint: '/mbahnunungonline',
            coverimage: 'https://i.imgur.com/v3cg03k.jpeg',
            metadatatechnic: 'corsproxy',
            ownmetadataurl: '',
            metadataeventsourceurl: ZENO_METADATA_EVENTSOURCE_URL,
            corsproxy: 'https://cors-proxy.elfsight.com/',
            usestreamcorsproxy: 'false',
            streamsuffix: '',
            healthinterval: 20000
        },
        voz: {
            mode: 'voz',
            radioname: 'ATIVIDADE FM 103.1FM',
            streamurl: 'http://radioaovivo.senado.gov.br/canal2.mp3',
            streamtype: 'other',
            icecastmountpoint: '',
            coverimage: 'https://i.imgur.com/F0cxBQ9.png',
            metadatatechnic: 'ownmetadataurl',
            ownmetadataurl: 'data:text/plain,A%20voz%20do%20Brasil',
            metadataeventsourceurl: '',
            corsproxy: 'https://cors-proxy.elfsight.com/',
            usestreamcorsproxy: 'false',
            streamsuffix: '#',
            healthinterval: 60000
        }
    };

    const schedulerState = {
        serverOffsetMs: 0,
        currentMode: null,
        syncRunning: false,
        syncReady: false,
        lastInitToken: 0,
        switchInProgress: false,
        fallbackId: '',
        fallbackStreamUrl: '',
        fallbackMetadataUrl: '',
        lastFailoverReason: '',
        lastSwitchAt: 0,
        healthMonitorTimer: null,
        zenoReturnProbeTimer: null,
        visualizerSilenceSince: 0,
        lastVisualizerSignature: '',
        lastCanvasActivityAt: 0,
        activeMediaEl: null,
        backgroundProbeRunning: false,
        lastActiveHealthMode: null
    };

    function getSyncedNow() {
        return new Date(Date.now() + schedulerState.serverOffsetMs);
    }

    function getSaoPauloParts(date) {
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/Sao_Paulo',
            weekday: 'short',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        const parts = formatter.formatToParts(date);
        const map = {};
        parts.forEach(p => {
            if (p.type !== 'literal') map[p.type] = p.value;
        });
        return {
            weekday: (map.weekday || '').toLowerCase(),
            hour: Number(map.hour || '0'),
            minute: Number(map.minute || '0'),
            second: Number(map.second || '0')
        };
    }

    function isWeekdaySP(parts) {
        return ['mon', 'tue', 'wed', 'thu', 'fri'].includes(parts.weekday);
    }

    function getDesiredBaseMode(parts) {
        return isWeekdaySP(parts) && parts.hour === 19 ? 'voz' : 'zeno';
    }

    async function syncServerTime() {
        if (schedulerState.syncRunning) return;
        schedulerState.syncRunning = true;
        try {
            const response = await fetch(TIME_API_URL, { cache: 'no-store' });
            const data = await response.json();
            if (data && data.datetime) {
                schedulerState.serverOffsetMs = new Date(data.datetime).getTime() - Date.now();
                schedulerState.syncReady = true;
            } else {
                schedulerState.serverOffsetMs = 0;
            }
        } catch (err) {
            console.warn('[ATIVIDADE] Falha ao sincronizar horário da API:', err);
            schedulerState.serverOffsetMs = 0;
        } finally {
            schedulerState.syncRunning = false;
        }
    }

    function getDocumentMedia() {
        return Array.from(document.querySelectorAll('audio, video'));
    }

    function detectWasPlaying() {
        const pauseBtn = document.getElementById('playerbuttonpause');
        if (pauseBtn) {
            const style = window.getComputedStyle(pauseBtn);
            if (style.display !== 'none' && parseFloat(style.opacity || '0') > 0) {
                return true;
            }
        }
        return getDocumentMedia().some(el => !el.paused && !el.ended);
    }

    function hardStopMediaElement(el) {
        try { el.muted = true; } catch (e) {}
        try { el.volume = 0; } catch (e) {}
        try { el.pause(); } catch (e) {}
        try { el.removeAttribute('src'); } catch (e) {}
        try { el.src = ''; } catch (e) {}
        try { el.srcObject = null; } catch (e) {}
        try {
            Array.from(el.querySelectorAll('source')).forEach(source => {
                try { source.removeAttribute('src'); } catch (e) {}
                try { source.src = ''; } catch (e) {}
            });
        } catch (e) {}
        try { el.load(); } catch (e) {}
    }

    function clickPauseIfVisible() {
        const btn = document.getElementById('playerbuttonpause');
        if (!btn) return;
        try {
            const style = window.getComputedStyle(btn);
            if (style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity || '1') > 0) {
                btn.click();
            }
        } catch (e) {}
    }

    async function stopCurrentPlaybackHard() {
        clickPauseIfVisible();
        for (let pass = 0; pass < 6; pass++) {
            getDocumentMedia().forEach(hardStopMediaElement);
            await new Promise(resolve => setTimeout(resolve, 140));
        }
        getDocumentMedia().forEach(el => {
            try { el.remove(); } catch (e) {}
        });
        await new Promise(resolve => setTimeout(resolve, 180));
    }

    function recreatePlayerMount() {
        const current = document.getElementById('player');
        if (!current || !current.parentNode) return current;
        const replacement = document.createElement('div');
        replacement.id = 'player';
        replacement.style.margin = '0 auto';
        replacement.style.width = '100%';
        replacement.style.height = '100%';
        current.parentNode.replaceChild(replacement, current);
        return replacement;
    }

    function removePlayerArtifacts() {
        document.querySelectorAll('#atividade-metadata-overlay, #atividade-song-info-external').forEach(el => {
            try { el.remove(); } catch (e) {}
        });
        document.querySelectorAll('#player iframe, #player object, #player embed, #player source').forEach(el => {
            try { el.remove(); } catch (e) {}
        });
    }

    function buildLunaOptions(config, autoplay) {
        const options = {
            radioname: config.radioname,
            streamurl: config.streamurl,
            streamtype: config.streamtype,
            icecastmountpoint: config.icecastmountpoint,
            coverimage: config.coverimage,
            volume: '100',
            autoplay: autoplay ? 'true' : 'false',
            shoutcastpath: '/rbtfm?type=https&amp;nocache=377274',
            shoutcastid: '1',
            onlycoverimage: 'false',
            coverstyle: 'square',
            usevisualizer: 'real',
            visualizertype: '8',
            userinterface: 'big',
            backgroundcolor: '',
            fontcolor: '#ffffff',
            hightlightcolor: '#000000',
            fontname: 'Orbitron',
            googlefont: 'Orbitron',
            fontratio: '0.9',
            scroll: 'true',
            displayliveicon: 'true',
            metadatatechnic: config.metadatatechnic,
            ownmetadataurl: config.ownmetadataurl,
            corsproxy: config.corsproxy,
            usestreamcorsproxy: config.usestreamcorsproxy,
            visualizeropacity: '1.0',
            multicolorvisualizer: 'true',
            color1: '#00FF00',
            color2: '#ffff00',
            color3: '#FF1F6F',
            color4: '#FF1F6F',
            metadatainterval: String(config.healthinterval || (config.mode === 'voz' ? 60000 : 20000))
        };

        if (config.streamsuffix) {
            options.streamsuffix = config.streamsuffix;
        }

        return options;
    }

    function parseFallbackIdFromText(raw) {
        const text = String(raw || '').trim();
        if (!text) return '';

        const directMatch = text.match(/\b(?:idunico|id)\s*[:=]\s*([a-f0-9]{16,64})\b/i);
        if (directMatch) return directMatch[1];

        try {
            const json = JSON.parse(text);
            if (json && typeof json === 'object') {
                const candidate = json.idunico || json.id || json.uniqueId || json.uid;
                if (candidate && /^[a-f0-9]{16,64}$/i.test(String(candidate))) {
                    return String(candidate);
                }
            }
        } catch (e) {}

        const genericMatch = text.match(/\b([a-f0-9]{16,64})\b/i);
        return genericMatch ? genericMatch[1] : '';
    }

    async function fetchTextWithTimeout(url, timeoutMs) {
        const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
        const timer = controller ? setTimeout(() => controller.abort(), timeoutMs) : null;
        try {
            const response = await fetch(url, {
                cache: 'no-store',
                signal: controller ? controller.signal : undefined
            });
            const text = await response.text();
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            return text;
        } finally {
            if (timer) clearTimeout(timer);
        }
    }

    async function resolveFallbackId(forceRefresh) {
        if (!forceRefresh && schedulerState.fallbackId) {
            return schedulerState.fallbackId;
        }
        const raw = await fetchTextWithTimeout(FALLBACK_ENTRY_URL, 8000);
        const fallbackId = parseFallbackIdFromText(raw);
        if (!fallbackId) {
            throw new Error('idunico não encontrado em ' + FALLBACK_ENTRY_URL);
        }
        schedulerState.fallbackId = fallbackId;
        schedulerState.fallbackStreamUrl = FALLBACK_ENTRY_URL + '?idunico=' + encodeURIComponent(fallbackId);
        schedulerState.fallbackMetadataUrl = FALLBACK_METADATA_BASE_URL + '?idunico=' + encodeURIComponent(fallbackId);
        return fallbackId;
    }

    async function buildFallbackConfig(forceRefreshId) {
        const fallbackId = await resolveFallbackId(!!forceRefreshId);
        return {
            mode: 'fallback',
            radioname: 'ATIVIDADE FM',
            streamurl: schedulerState.fallbackStreamUrl,
            streamtype: 'other',
            icecastmountpoint: '',
            coverimage: 'https://i.imgur.com/v3cg03k.jpeg',
            metadatatechnic: 'ownmetadataurl',
            ownmetadataurl: 'data:text/plain,ATIVIDADE%20FM',
            metadataeventsourceurl: schedulerState.fallbackMetadataUrl,
            corsproxy: 'https://cors-proxy.elfsight.com/',
            usestreamcorsproxy: 'false',
            streamsuffix: '#',
            fallbackId: fallbackId,
            healthinterval: 60000
        };
    }

    function getCurrentPlayerMedia() {
        return document.querySelector('#player audio, #player video') || document.querySelector('audio, video');
    }

    function getCurrentPlayerCanvas() {
        return document.querySelector('#player canvas#playercanvas, #player #playercanvas, #player canvas');
    }

    function isPlayerActivelyPlaying() {
        const pauseBtn = document.getElementById('playerbuttonpause');
        if (pauseBtn) {
            try {
                const style = window.getComputedStyle(pauseBtn);
                if (style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity || '0') > 0) {
                    return true;
                }
            } catch (e) {}
        }
        const media = getCurrentPlayerMedia();
        return !!(media && !media.paused && !media.ended);
    }

    function getEffectivePlayerVolumeState() {
        const media = getCurrentPlayerMedia();
        if (media) {
            return {
                muted: !!media.muted,
                volume: Number.isFinite(media.volume) ? Number(media.volume) : 1
            };
        }

        const unmuteBtn = document.getElementById('playerbuttonunmute');
        let muted = false;
        try {
            if (unmuteBtn) {
                const style = window.getComputedStyle(unmuteBtn);
                muted = style.display !== 'none' && style.visibility !== 'hidden';
            }
        } catch (e) {}

        return { muted: muted, volume: muted ? 0 : 1 };
    }

    function sampleVisualizerSignature() {
        const canvas = getCurrentPlayerCanvas();
        if (!canvas || !canvas.width || !canvas.height) {
            return { signature: '', activity: 0 };
        }

        let ctx;
        try {
            ctx = canvas.getContext('2d', { willReadFrequently: true }) || canvas.getContext('2d');
        } catch (e) {
            ctx = canvas.getContext('2d');
        }
        if (!ctx) return { signature: '', activity: 0 };

        const rows = [0.2, 0.4, 0.6, 0.8];
        const step = Math.max(2, Math.floor(canvas.width / 48));
        let hash = 0;
        let active = 0;
        let count = 0;

        rows.forEach(function(ratio) {
            const y = Math.max(0, Math.min(canvas.height - 1, Math.floor(canvas.height * ratio)));
            let row;
            try {
                row = ctx.getImageData(0, y, canvas.width, 1).data;
            } catch (e) {
                row = null;
            }
            if (!row) return;
            for (let x = 0; x < canvas.width; x += step) {
                const idx = x * 4;
                const r = row[idx] || 0;
                const g = row[idx + 1] || 0;
                const b = row[idx + 2] || 0;
                const a = row[idx + 3] || 0;
                const energy = r + g + b + a;
                if (energy > 24) active += 1;
                hash = (hash * 131 + ((r * 3) + (g * 5) + (b * 7) + a)) % 2147483647;
                count += 1;
            }
        });

        return {
            signature: count ? String(hash) : '',
            activity: count ? (active / count) : 0
        };
    }

    function stopHealthMonitor() {
        if (schedulerState.healthMonitorTimer) {
            clearInterval(schedulerState.healthMonitorTimer);
            schedulerState.healthMonitorTimer = null;
        }
        schedulerState.visualizerSilenceSince = 0;
        schedulerState.lastVisualizerSignature = '';
        schedulerState.lastCanvasActivityAt = 0;
        schedulerState.activeMediaEl = null;
        schedulerState.lastActiveHealthMode = null;
    }

    function stopZenoReturnProbe() {
        if (schedulerState.zenoReturnProbeTimer) {
            clearInterval(schedulerState.zenoReturnProbeTimer);
            schedulerState.zenoReturnProbeTimer = null;
        }
        schedulerState.backgroundProbeRunning = false;
    }

    function canSwitchNow() {
        return (Date.now() - schedulerState.lastSwitchAt) >= FAILOVER_COOLDOWN_MS;
    }

    async function switchToModeSafely(mode, reason, options) {
        const parts = getSaoPauloParts(getSyncedNow());
        if (getDesiredBaseMode(parts) === 'voz' && mode !== 'voz') {
            return;
        }
        if (schedulerState.switchInProgress) return;
        if (!canSwitchNow()) return;
        if (schedulerState.currentMode === mode && !(options && options.forceRefreshId)) return;

        schedulerState.lastFailoverReason = reason || '';
        schedulerState.lastSwitchAt = Date.now();
        await initRadio(mode, options || {});
    }

    async function activateFallback(reason) {
        try {
            await switchToModeSafely('fallback', reason || 'failover', { forceRefreshId: !schedulerState.fallbackId });
        } catch (err) {
            console.warn('[ATIVIDADE] Falha ao ativar fallback:', err);
        }
    }

    async function restoreZeno(reason) {
        try {
            await switchToModeSafely('zeno', reason || 'zeno-ok');
        } catch (err) {
            console.warn('[ATIVIDADE] Falha ao restaurar Zeno:', err);
        }
    }

    function bindMediaFailureEvents(el) {
        if (!el || el.__atividadeFailoverBound) return;
        el.__atividadeFailoverBound = true;

        ['error', 'abort', 'emptied', 'stalled', 'suspend'].forEach(function(evtName) {
            el.addEventListener(evtName, function() {
                if (schedulerState.currentMode !== 'zeno') return;
                const mediaErrorCode = el && el.error ? el.error.code : 0;
                console.warn('[ATIVIDADE] Zeno falhou no media element:', evtName, 'code=', mediaErrorCode, 'src=', el.currentSrc || el.src || '');
                activateFallback('media-' + evtName + (mediaErrorCode ? ('-code' + mediaErrorCode) : ''));
            });
        });
    }

    function runZenoHealthCheckTick() {
        if (schedulerState.currentMode !== 'zeno') return;

        const media = getCurrentPlayerMedia();
        if (media) {
            schedulerState.activeMediaEl = media;
            bindMediaFailureEvents(media);

            if (media.error) {
                const mediaErrorCode = media.error.code || 0;
                console.warn('[ATIVIDADE] Zeno com media.error no health check:', mediaErrorCode, media.currentSrc || media.src || '');
                activateFallback('media-error-state' + (mediaErrorCode ? ('-code' + mediaErrorCode) : ''));
                return;
            }

            const currentSrc = String(media.currentSrc || media.src || '');
            const zenoRequested = /zeno\.fm\//i.test(currentSrc) || currentSrc === '';
            const isBrokenNetworkState = media.networkState === 3;
            const looksStuck = zenoRequested && isBrokenNetworkState && media.readyState === 0;
            if (looksStuck) {
                console.warn('[ATIVIDADE] Zeno travado no health check: networkState=', media.networkState, 'readyState=', media.readyState, 'src=', currentSrc);
                activateFallback('network-no-source');
                return;
            }
        }

        if (!isPlayerActivelyPlaying()) {
            schedulerState.visualizerSilenceSince = 0;
            schedulerState.lastVisualizerSignature = '';
            return;
        }

        const volumeState = getEffectivePlayerVolumeState();
        if (volumeState.muted || Number(volumeState.volume || 0) <= 0) {
            schedulerState.visualizerSilenceSince = 0;
            schedulerState.lastVisualizerSignature = '';
            return;
        }

        const visualizer = sampleVisualizerSignature();
        const now = Date.now();
        const firstReadableSample = visualizer.signature && !schedulerState.lastVisualizerSignature;
        const hasMovement = visualizer.signature && visualizer.signature !== schedulerState.lastVisualizerSignature;

        if (firstReadableSample || hasMovement) {
            schedulerState.lastCanvasActivityAt = now;
            schedulerState.visualizerSilenceSince = 0;
        } else if (!schedulerState.visualizerSilenceSince) {
            schedulerState.visualizerSilenceSince = now;
        }

        schedulerState.lastVisualizerSignature = visualizer.signature;

        if (schedulerState.visualizerSilenceSince && (now - schedulerState.visualizerSilenceSince) >= FALLBACK_HEALTH_CHECK_MS) {
            activateFallback('silence-12s');
        }
    }

    function startHealthMonitorForZeno() {
        stopHealthMonitor();
        schedulerState.lastActiveHealthMode = 'zeno';
        schedulerState.healthMonitorTimer = setInterval(runZenoHealthCheckTick, 1500);
        setTimeout(runZenoHealthCheckTick, 1800);
    }

    function createHiddenProbeAudio() {
        const audio = document.createElement('audio');
        audio.preload = 'auto';
        audio.muted = true;
        audio.volume = 0;
        audio.autoplay = false;
        audio.playsInline = true;
        try { audio.crossOrigin = 'anonymous'; } catch (e) {}
        audio.style.display = 'none';
        return audio;
    }

    async function probeZenoAvailability() {
        if (schedulerState.backgroundProbeRunning) return { ok: false, reason: 'busy' };
        schedulerState.backgroundProbeRunning = true;

        try {
            return await new Promise(function(resolve) {
                const probe = createHiddenProbeAudio();
                let finished = false;
                const timeoutId = setTimeout(function() {
                    finish(false, 'timeout');
                }, ZENO_RETURN_PROBE_TIMEOUT_MS);

                function cleanup() {
                    clearTimeout(timeoutId);
                    ['loadedmetadata', 'canplay', 'canplaythrough', 'playing', 'error', 'stalled', 'abort'].forEach(function(evt) {
                        probe.removeEventListener(evt, listeners[evt]);
                    });
                    try { probe.pause(); } catch (e) {}
                    try { probe.removeAttribute('src'); } catch (e) {}
                    try { probe.src = ''; } catch (e) {}
                    try { probe.load(); } catch (e) {}
                    try { probe.remove(); } catch (e) {}
                }

                function finish(ok, reason) {
                    if (finished) return;
                    finished = true;
                    cleanup();
                    resolve({ ok: ok, reason: reason });
                }

                const listeners = {
                    loadedmetadata: function() { finish(true, 'loadedmetadata'); },
                    canplay: function() { finish(true, 'canplay'); },
                    canplaythrough: function() { finish(true, 'canplaythrough'); },
                    playing: function() { finish(true, 'playing'); },
                    error: function() { finish(false, 'error'); },
                    stalled: function() { finish(false, 'stalled'); },
                    abort: function() { finish(false, 'abort'); }
                };

                Object.keys(listeners).forEach(function(evt) {
                    probe.addEventListener(evt, listeners[evt], { once: true });
                });

                try {
                    probe.src = ZENO_STREAM_URL + (ZENO_STREAM_URL.includes('?') ? '&' : '?') + '_probe=' + Date.now();
                    document.body.appendChild(probe);
                    probe.load();
                } catch (err) {
                    finish(false, 'exception');
                }
            });
        } finally {
            schedulerState.backgroundProbeRunning = false;
        }
    }

    function startZenoReturnProbe() {
        stopZenoReturnProbe();

        const runProbe = async function() {
            if (schedulerState.currentMode !== 'fallback') return;
            const parts = getSaoPauloParts(getSyncedNow());
            if (getDesiredBaseMode(parts) === 'voz') return;
            const result = await probeZenoAvailability();
            if (result.ok) {
                restoreZeno('probe-' + result.reason);
            }
        };

        schedulerState.zenoReturnProbeTimer = setInterval(runProbe, ZENO_RETURN_PROBE_MS);
        setTimeout(runProbe, 3500);
    }

    function refreshRuntimeMonitors() {
        stopHealthMonitor();
        stopZenoReturnProbe();

        if (schedulerState.currentMode === 'zeno') {
            startHealthMonitorForZeno();
            return;
        }

        if (schedulerState.currentMode === 'fallback') {
            startZenoReturnProbe();
        }
    }

    async function initRadio(modeToLoad, options) {
        const parts = getSaoPauloParts(getSyncedNow());
        const fallbackPreferred = schedulerState.currentMode === 'fallback';
        const requestedMode = modeToLoad || (getDesiredBaseMode(parts) === 'voz' ? 'voz' : (fallbackPreferred ? 'fallback' : 'zeno'));
        let config;

        if (requestedMode === 'fallback') {
            config = await buildFallbackConfig(options && options.forceRefreshId);
        } else {
            config = STREAMS[requestedMode] || STREAMS.zeno;
        }

        const wasPlaying = detectWasPlaying();
        const token = ++schedulerState.lastInitToken;

        if (schedulerState.switchInProgress) return;
        schedulerState.switchInProgress = true;

        try {
            await stopCurrentPlaybackHard();
            removePlayerArtifacts();
            const playerMount = recreatePlayerMount();
            await new Promise(resolve => setTimeout(resolve, 180));
            if (!playerMount) return;

            $(playerMount).empty();
            $(playerMount).lunaradio(buildLunaOptions(config, wasPlaying));

            setTimeout(function bindFreshMediaEarly() {
                const freshMedia = getCurrentPlayerMedia();
                if (!freshMedia) return;
                bindMediaFailureEvents(freshMedia);
            }, 120);
            setTimeout(function bindFreshMediaAgain() {
                const freshMedia = getCurrentPlayerMedia();
                if (!freshMedia) return;
                bindMediaFailureEvents(freshMedia);
                if (config.mode === 'zeno' && freshMedia.error) {
                    const mediaErrorCode = freshMedia.error.code || 0;
                    console.warn('[ATIVIDADE] Zeno falhou logo após reinicializar:', mediaErrorCode, freshMedia.currentSrc || freshMedia.src || '');
                    activateFallback('post-init-error' + (mediaErrorCode ? ('-code' + mediaErrorCode) : ''));
                }
            }, 900);

            schedulerState.currentMode = config.mode;
            window.__atividadeCurrentStreamMode = config.mode;
            window.__atividadeCurrentStreamConfig = config;

            window.dispatchEvent(new CustomEvent('atividade-stream-mode-change', {
                detail: {
                    mode: config.mode,
                    isVoz: config.mode === 'voz',
                    isFallback: config.mode === 'fallback',
                    streamurl: config.streamurl,
                    coverimage: config.coverimage,
                    metadataeventsourceurl: config.metadataeventsourceurl || '',
                    fallbackId: config.fallbackId || '',
                    forcedTitle: config.mode === 'voz' ? 'A voz do Brasil' : ''
                }
            }));

            setTimeout(function() {
                if (token !== schedulerState.lastInitToken) return;
                refreshRuntimeMonitors();
                window.dispatchEvent(new CustomEvent('lunaradio-reinitialized', {
                    detail: {
                        wasPlaying: wasPlaying,
                        mode: config.mode
                    }
                }));
            }, 500);
        } finally {
            setTimeout(() => {
                schedulerState.switchInProgress = false;
            }, 650);
        }
    }

    function evaluateScheduler() {
        if (schedulerState.switchInProgress) return;
        const parts = getSaoPauloParts(getSyncedNow());
        const desiredBaseMode = getDesiredBaseMode(parts);

        if (!schedulerState.currentMode) {
            initRadio(desiredBaseMode === 'voz' ? 'voz' : 'zeno');
            return;
        }

        if (desiredBaseMode === 'voz') {
            if (schedulerState.currentMode !== 'voz') {
                initRadio('voz');
            }
            return;
        }

        if (schedulerState.currentMode === 'voz') {
            initRadio('zeno');
        }
    }

    async function bootstrapScheduler() {
        await syncServerTime();
        evaluateScheduler();
        setInterval(evaluateScheduler, 1000);
        setInterval(syncServerTime, 300000);
    }

    bootstrapScheduler();
})();
</script>

(function () {
    const elementoID = document.getElementById('relogio');
    const TIME_API_URL = 'https://time.now/developer/api/timezone/America/Sao_Paulo';
    let serverOffsetMs = 0;
    let timezoneAtual = 'America/Sao_Paulo';

    function getNow() {
        return new Date(Date.now() + serverOffsetMs);
    }

    function renderizarHora() {
        const agoraServidor = getNow();
        try {
            const partes = new Intl.DateTimeFormat('pt-BR', {
                timeZone: timezoneAtual,
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).formatToParts(agoraServidor);
            const hh = partes.find(p => p.type === 'hour')?.value || '00';
            const mm = partes.find(p => p.type === 'minute')?.value || '00';
            const ss = partes.find(p => p.type === 'second')?.value || '00';
            elementoID.textContent = `${hh}:${mm}:${ss}`;
        } catch (erro) {
            elementoID.textContent = agoraServidor.toLocaleTimeString();
        }
    }

    async function sincronizarHora() {
        try {
            const resposta = await fetch(TIME_API_URL, { cache: 'no-store' });
            const dados = await resposta.json();
            if (dados && dados.datetime) {
                serverOffsetMs = new Date(dados.datetime).getTime() - Date.now();
            } else {
                serverOffsetMs = 0;
            }
            renderizarHora();
        } catch (erro) {
            serverOffsetMs = 0;
            renderizarHora();
        }
    }

    setInterval(renderizarHora, 1000);
    setInterval(sincronizarHora, 300000);
    sincronizarHora();
})();
