<div id="main-wrapper">

    </footer>

<script>
(function () {
    window.resetUI = window.resetUI || function () {};

    const TIME_API_URL = 'https://time.now/developer/api/timezone/America/Sao_Paulo';
    const STREAMS = {
        zeno: {
            mode: 'zeno',
            radioname: 'ATIVIDADE FM',
            streamurl: 'https://stream.zeno.fm/z2h3tpp2fchvv',
            streamtype: 'zeno',
            icecastmountpoint: '/mbahnunungonline',
            coverimage: 'https://i.imgur.com/v3cg03k.jpeg',
            metadatatechnic: 'corsproxy',
            ownmetadataurl: '',
            corsproxy: 'https://cors-proxy.elfsight.com/',
            usestreamcorsproxy: 'false',
            streamsuffix: ''
        },
        voz: {
            mode: 'voz',
            radioname: 'ATIVIDADE FM 103.1FM',
            streamurl: 'http://radioaovivo.senado.gov.br/canal2.mp3',
            streamtype: 'other',
            icecastmountpoint: '',
            coverimage: 'https://i.imgur.com/F0cxBQ9.png',
            metadatatechnic: 'ownmetadataurl',
            ownmetadataurl: 'data:text/plain,A%20voz%20do%20Brasil',
            corsproxy: 'https://cors-proxy.elfsight.com/',
            usestreamcorsproxy: 'false',
            streamsuffix: '#'
        }
    };

    const schedulerState = {
        serverOffsetMs: 0,
        currentMode: null,
        syncRunning: false,
        syncReady: false,
        lastInitToken: 0,
        switchInProgress: false
    };

    function getSyncedNow() {
        return new Date(Date.now() + schedulerState.serverOffsetMs);
    }

    function getSaoPauloParts(date) {
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/Sao_Paulo',
            weekday: 'short',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        const parts = formatter.formatToParts(date);
        const map = {};
        parts.forEach(p => {
            if (p.type !== 'literal') map[p.type] = p.value;
        });
        return {
            weekday: (map.weekday || '').toLowerCase(),
            hour: Number(map.hour || '0'),
            minute: Number(map.minute || '0'),
            second: Number(map.second || '0')
        };
    }

    function isWeekdaySP(parts) {
        return ['mon', 'tue', 'wed', 'thu', 'fri'].includes(parts.weekday);
    }

    function getDesiredMode(parts) {
        return isWeekdaySP(parts) && parts.hour === 19 ? 'voz' : 'zeno';
    }

    async function syncServerTime() {
        if (schedulerState.syncRunning) return;
        schedulerState.syncRunning = true;
        try {
            const response = await fetch(TIME_API_URL, { cache: 'no-store' });
            const data = await response.json();
            if (data && data.datetime) {
                schedulerState.serverOffsetMs = new Date(data.datetime).getTime() - Date.now();
                schedulerState.syncReady = true;
            } else {
                schedulerState.serverOffsetMs = 0;
            }
        } catch (err) {
            console.warn('[ATIVIDADE] Falha ao sincronizar horário da API:', err);
            schedulerState.serverOffsetMs = 0;
        } finally {
            schedulerState.syncRunning = false;
        }
    }

    function getDocumentMedia() {
        return Array.from(document.querySelectorAll('audio, video'));
    }

    function detectWasPlaying() {
        const pauseBtn = document.getElementById('playerbuttonpause');
        if (pauseBtn) {
            const style = window.getComputedStyle(pauseBtn);
            if (style.display !== 'none' && parseFloat(style.opacity || '0') > 0) {
                return true;
            }
        }
        return getDocumentMedia().some(el => !el.paused && !el.ended);
    }

    function hardStopMediaElement(el) {
        try { el.muted = true; } catch (e) {}
        try { el.volume = 0; } catch (e) {}
        try { el.pause(); } catch (e) {}
        try { el.removeAttribute('src'); } catch (e) {}
        try { el.src = ''; } catch (e) {}
        try { el.srcObject = null; } catch (e) {}
        try {
            Array.from(el.querySelectorAll('source')).forEach(source => {
                try { source.removeAttribute('src'); } catch (e) {}
                try { source.src = ''; } catch (e) {}
            });
        } catch (e) {}
        try { el.load(); } catch (e) {}
    }

    function clickPauseIfVisible() {
        const btn = document.getElementById('playerbuttonpause');
        if (!btn) return;
        try {
            const style = window.getComputedStyle(btn);
            if (style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity || '1') > 0) {
                btn.click();
            }
        } catch (e) {}
    }

    async function stopCurrentPlaybackHard() {
        clickPauseIfVisible();
        for (let pass = 0; pass < 6; pass++) {
            getDocumentMedia().forEach(hardStopMediaElement);
            await new Promise(resolve => setTimeout(resolve, 140));
        }
        getDocumentMedia().forEach(el => {
            try { el.remove(); } catch (e) {}
        });
        await new Promise(resolve => setTimeout(resolve, 180));
    }


    function recreatePlayerMount() {
        const current = document.getElementById('player');
        if (!current || !current.parentNode) return current;
        const replacement = document.createElement('div');
        replacement.id = 'player';
        replacement.style.margin = '0 auto';
        replacement.style.width = '100%';
        replacement.style.height = '100%';
        current.parentNode.replaceChild(replacement, current);
        return replacement;
    }

    function removePlayerArtifacts() {
        document.querySelectorAll('#atividade-metadata-overlay, #atividade-song-info-external').forEach(el => {
            try { el.remove(); } catch (e) {}
        });
        document.querySelectorAll('#player iframe, #player object, #player embed, #player source').forEach(el => {
            try { el.remove(); } catch (e) {}
        });
    }

    function buildLunaOptions(config, autoplay) {
        const options = {
            radioname: config.radioname,
            streamurl: config.streamurl,
            streamtype: config.streamtype,
            icecastmountpoint: config.icecastmountpoint,
            coverimage: config.coverimage,
            volume: '100',
            autoplay: autoplay ? 'true' : 'false',
            shoutcastpath: '/rbtfm?type=https&amp;nocache=377274',
            shoutcastid: '1',
            onlycoverimage: 'false',
            coverstyle: 'square',
            usevisualizer: 'real',
            visualizertype: '8',
            userinterface: 'big',
            backgroundcolor: '',
            fontcolor: '#ffffff',
            hightlightcolor: '#000000',
            fontname: 'Orbitron',
            googlefont: 'Orbitron',
            fontratio: '0.9',
            scroll: 'true',
            displayliveicon: 'true',
            metadatatechnic: config.metadatatechnic,
            ownmetadataurl: config.ownmetadataurl,
            corsproxy: config.corsproxy,
            usestreamcorsproxy: config.usestreamcorsproxy,
            visualizeropacity: '1.0',
            multicolorvisualizer: 'true',
            color1: '#00FF00',
            color2: '#ffff00',
            color3: '#FF1F6F',
            color4: '#FF1F6F',
            metadatainterval: config.mode === 'voz' ? '60000' : '20000'
        };

        if (config.streamsuffix) {
            options.streamsuffix = config.streamsuffix;
        }

        return options;
    }

    async function initRadio(modeToLoad) {
        const mode = modeToLoad || getDesiredMode(getSaoPauloParts(getSyncedNow()));
        const config = STREAMS[mode] || STREAMS.zeno;
        const wasPlaying = detectWasPlaying();
        const token = ++schedulerState.lastInitToken;

        if (schedulerState.switchInProgress) return;
        schedulerState.switchInProgress = true;

        try {
            await stopCurrentPlaybackHard();
            removePlayerArtifacts();
            const playerMount = recreatePlayerMount();
            await new Promise(resolve => setTimeout(resolve, 180));
            if (!playerMount) return;

            $(playerMount).empty();
            $(playerMount).lunaradio(buildLunaOptions(config, wasPlaying));

            schedulerState.currentMode = mode;
            window.__atividadeCurrentStreamMode = mode;
            window.__atividadeCurrentStreamConfig = config;

            window.dispatchEvent(new CustomEvent('atividade-stream-mode-change', {
                detail: {
                    mode: mode,
                    isVoz: mode === 'voz',
                    streamurl: config.streamurl,
                    coverimage: config.coverimage,
                    forcedTitle: mode === 'voz' ? 'A voz do Brasil' : ''
                }
            }));

            setTimeout(function() {
                if (token !== schedulerState.lastInitToken) return;
                window.dispatchEvent(new CustomEvent('lunaradio-reinitialized', {
                    detail: {
                        wasPlaying: wasPlaying,
                        mode: mode
                    }
                }));
            }, 500);
        } finally {
            setTimeout(() => {
                schedulerState.switchInProgress = false;
            }, 650);
        }
    }

    function evaluateScheduler() {
        if (schedulerState.switchInProgress) return;
        const parts = getSaoPauloParts(getSyncedNow());
        const desiredMode = getDesiredMode(parts);

        if (!schedulerState.currentMode) {
            initRadio(desiredMode);
        } else if (desiredMode !== schedulerState.currentMode) {
            initRadio(desiredMode);
        }
    }

    async function bootstrapScheduler() {
        await syncServerTime();
        evaluateScheduler();
        setInterval(evaluateScheduler, 1000);
        setInterval(syncServerTime, 300000);
    }

    bootstrapScheduler();
})();
</script>

<script>
// Relógio
(function () {
    const elementoID = document.getElementById('relogio');
    const TIME_API_URL = 'https://time.now/developer/api/timezone/America/Sao_Paulo';
    let serverOffsetMs = 0;
    let timezoneAtual = 'America/Sao_Paulo';

    function getNow() {
        return new Date(Date.now() + serverOffsetMs);
    }

    function renderizarHora() {
        const agoraServidor = getNow();
        try {
            const partes = new Intl.DateTimeFormat('pt-BR', {
                timeZone: timezoneAtual,
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).formatToParts(agoraServidor);
            const hh = partes.find(p => p.type === 'hour')?.value || '00';
            const mm = partes.find(p => p.type === 'minute')?.value || '00';
            const ss = partes.find(p => p.type === 'second')?.value || '00';
            elementoID.textContent = `${hh}:${mm}:${ss}`;
        } catch (erro) {
            elementoID.textContent = agoraServidor.toLocaleTimeString();
        }
    }

    async function sincronizarHora() {
        try {
            const resposta = await fetch(TIME_API_URL, { cache: 'no-store' });
            const dados = await resposta.json();
            if (dados && dados.datetime) {
                serverOffsetMs = new Date(dados.datetime).getTime() - Date.now();
            } else {
                serverOffsetMs = 0;
            }
            renderizarHora();
        } catch (erro) {
            serverOffsetMs = 0;
            renderizarHora();
        }
    }

    setInterval(renderizarHora, 1000);
    setInterval(sincronizarHora, 300000);
    sincronizarHora();
})();
